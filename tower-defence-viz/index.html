<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD Debugger: Snake View</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --accent: #00d4ff;
            --enemy: #ff4d4d;
            --tower: #2ecc71;
            --text: #e0e0e0;
            --path: #2a2a2a;
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .wrapper { max-width: 1000px; margin: 0 auto; }
        
        /* Input & UI */
        .header-panel { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        textarea { 
            width: 100%; height: 100px; background: #000; border: 1px solid #444; 
            color: #00ff41; padding: 10px; border-radius: 6px; font-family: 'Fira Code', monospace; font-size: 12px;
            box-sizing: border-box;
        }

        .controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between; margin-top: 15px; }
        .btn-group { display: flex; gap: 8px; }
        button { 
            padding: 8px 16px; cursor: pointer; background: var(--accent); color: #000; 
            border: none; border-radius: 4px; font-weight: bold; font-size: 13px;
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .stat-badge { background: #333; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; border: 1px solid #444; }

        /* Snake Track Logic */
        .game-world { 
            display: flex; flex-direction: column; gap: 40px; 
            background: var(--panel); padding: 40px; border-radius: 15px;
            border: 1px solid #333;
        }
        .row { display: flex; gap: 10px; position: relative; }
        
        /* Zig-zag direction handling */
        .row.reverse { flex-direction: row-reverse; }

        .cell { 
            width: 80px; height: 100px; background: var(--path); border-radius: 8px;
            position: relative; border: 2px solid #333; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cell.has-tower { border-color: var(--tower); background: #1a2e23; }
        .cell-idx { position: absolute; top: -20px; font-size: 11px; color: #888; width: 100%; text-align: center; }

        /* Path Connectors (The Arrows) */
        .connector {
            position: absolute; width: 30px; height: 2px; background: var(--accent);
            right: -25px; top: 50%; opacity: 0.5;
        }
        .connector::after {
            content: '▶'; position: absolute; right: -5px; top: -7px; font-size: 10px; color: var(--accent);
        }
        .row.reverse .connector { left: -25px; right: auto; transform: rotate(180deg); }
        
        /* Turn-around connector (Vertical) */
        .bend {
            position: absolute; width: 2px; height: 40px; background: var(--accent);
            bottom: -40px; opacity: 0.3;
        }
        .row:not(.reverse) .bend { right: 40px; }
        .row.reverse .bend { left: 40px; }

        /* Entities */
        .ent { width: 70px; padding: 4px; border-radius: 4px; font-size: 10px; text-align: center; margin: 1px 0; }
        .twr { background: var(--tower); color: #000; font-weight: bold; border: 1px solid #fff; position: absolute; top: 5px; }
        .nmy { background: var(--enemy); color: white; margin-top: 15px; }
        .hp { font-weight: bold; color: #ffeb3b; }

        #gameOver { color: var(--enemy); text-align: center; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-panel">
        <textarea id="rawInput" placeholder="Paste student output (Enemies: / Towers: blocks)..."></textarea>
        <div class="controls">
            <div class="btn-group">
                <button id="parseBtn" style="background: #fff;">LOAD ENGINE OUTPUT</button>
            </div>
            <div class="btn-group">
                <button id="prevBtn" disabled>◀ PREV</button>
                <div class="stat-badge" id="stepInfo">STEP: 0 / 0</div>
                <button id="nextBtn" disabled>NEXT ▶</button>
            </div>
            <div class="stat-badge">
                TRACK LEN: <input type="number" id="trackLength" style="width: 45px; background: none; border: none; color: inherit; font-weight: bold;" placeholder="Auto">
            </div>
        </div>
    </div>

    <div id="gameOver">⚠️ MISSION FAILED: GAME OVER ⚠️</div>
    <div id="visualizerArea" class="game-world" style="display:none;"></div>
</div>

<script>
    let states = [];
    let currentIndex = 0;
    const CELLS_PER_ROW = 10;

    const parseBtn = document.getElementById('parseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const rawInput = document.getElementById('rawInput');
    const stepInfo = document.getElementById('stepInfo');
    const visualizerArea = document.getElementById('visualizerArea');
    const trackLenInput = document.getElementById('trackLength');
    const gameOver = document.getElementById('gameOver');

    parseBtn.onclick = () => {
        states = parseStates(rawInput.value);
        if (states.length > 0) {
            if (!trackLenInput.value) {
                let max = 9;
                states.forEach(s => {
                    s.enemies.forEach(e => { if(e.pos > max) max = e.pos; });
                    s.towers.forEach(t => { if(t.pos > max) max = t.pos; });
                });
                trackLenInput.value = max + 1;
            }
            currentIndex = 0;
            visualizerArea.style.display = 'flex';
            render();
        }
    };

    prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; render(); } };
    nextBtn.onclick = () => { if (currentIndex < states.length - 1) { currentIndex++; render(); } };

    function parseStates(text) {
        const blocks = [];
        const lines = text.split('\n').map(l => l.trim().replace(/^>\s*/, ''));
        let current = null;
        let mode = null;

        lines.forEach(line => {
            if (line.startsWith('Enemies:')) {
                if (current) blocks.push(current);
                current = { enemies: [], towers: [], over: false };
                mode = 'E';
            } else if (line.startsWith('Towers:')) { mode = 'T'; }
            else if (line.startsWith('[')) {
                if (mode === 'E') {
                    const m = line.match(/\[(.*?):\s*HP=(-?\d+),\s*Pos=(\d+)\]/);
                    if (m) current.enemies.push({ name: m[1], hp: m[2], pos: parseInt(m[3]) });
                } else if (mode === 'T') {
                    const m = line.match(/\[(.*?) at Pos=(\d+)\]/);
                    if (m) current.towers.push({ name: m[1], pos: parseInt(m[2]) });
                }
            }
            if (line.toLowerCase().includes('game over')) if(current) current.over = true;
        });
        if (current) blocks.push(current);
        return blocks;
    }

    function render() {
        const state = states[currentIndex];
        const totalCells = parseInt(trackLenInput.value);
        visualizerArea.innerHTML = '';
        
        stepInfo.innerText = `STEP: ${currentIndex + 1} / ${states.length}`;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === states.length - 1;
        gameOver.style.display = state.over ? 'block' : 'none';

        let currentRow;
        for (let i = 0; i < totalCells; i++) {
            if (i % CELLS_PER_ROW === 0) {
                currentRow = document.createElement('div');
                currentRow.className = 'row';
                if (Math.floor(i / CELLS_PER_ROW) % 2 !== 0) currentRow.classList.add('reverse');
                visualizerArea.appendChild(currentRow);
                
                // Add vertical bend from previous row
                if (i > 0) {
                    const bend = document.createElement('div');
                    bend.className = 'bend';
                    visualizerArea.children[visualizerArea.children.length-2].appendChild(bend);
                }
            }

            const cell = document.createElement('div');
            const tower = state.towers.find(t => t.pos === i);
            cell.className = 'cell' + (tower ? ' has-tower' : '');
            cell.innerHTML = `<div class="cell-idx">${i}</div>`;

            if (tower) {
                const d = document.createElement('div');
                d.className = 'ent twr'; d.innerText = tower.name;
                cell.appendChild(d);
            }

            state.enemies.filter(e => e.pos === i).forEach(e => {
                const d = document.createElement('div');
                d.className = 'ent nmy'; 
                d.innerHTML = `<div>${e.name}</div><div class="hp">HP ${e.hp}</div>`;
                cell.appendChild(d);
            });

            // Horizontal arrow within row
            if ((i + 1) % CELLS_PER_ROW !== 0 && (i + 1) < totalCells) {
                const conn = document.createElement('div');
                conn.className = 'connector';
                cell.appendChild(conn);
            }

            currentRow.appendChild(cell);
        }
    }
</script>

</body>
</html>
